<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🔌 아파트 전기차 충전기 현황</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Malgun Gothic', sans-serif; background: #f1f5f9; color: #1e293b; }

.header {
    background: linear-gradient(135deg, #1d4ed8, #0ea5e9);
    color: white; padding: 24px 20px; text-align: center;
    box-shadow: 0 4px 16px rgba(0,0,0,0.2);
}
.header h1 { font-size: 1.8rem; font-weight: 700; margin-bottom: 16px; }
.search-row {
    display: flex; gap: 10px; max-width: 800px;
    margin: 0 auto; flex-wrap: wrap; justify-content: center;
}
.search-row input {
    flex: 1; min-width: 260px; padding: 12px 16px;
    border: none; border-radius: 10px; font-size: 1rem; outline: none;
}
.search-row select {
    padding: 12px 14px; border: none; border-radius: 10px;
    font-size: 0.95rem; background: white; cursor: pointer;
}
.btn {
    padding: 12px 20px; border: none; border-radius: 10px;
    font-size: 0.95rem; font-weight: 600; cursor: pointer;
    transition: all 0.2s; white-space: nowrap;
}
.btn:hover { transform: translateY(-1px); opacity: 0.9; }
.btn-search { background: #f59e0b; color: white; }
.btn-demo  { background: #059669; color: white; }

/* API 설정 */
.api-box {
    background: #fff7ed; border: 2px solid #fed7aa;
    border-radius: 12px; padding: 20px;
    margin: 16px auto; max-width: 1200px;
}
.api-title { font-weight: 700; color: #c2410c; font-size: 1rem; margin-bottom: 14px; }
.api-fields {
    display: grid; grid-template-columns: 1fr 1fr;
    gap: 16px; margin-bottom: 14px;
}
@media (max-width: 600px) { .api-fields { grid-template-columns: 1fr; } }
.api-field label {
    display: block; font-size: 0.85rem; font-weight: 700;
    color: #374151; margin-bottom: 6px;
}
.api-field input {
    width: 100%; padding: 10px 14px; border: 1.5px solid #d1d5db;
    border-radius: 8px; font-size: 0.85rem; transition: border-color 0.2s;
}
.api-field input:focus { outline: none; border-color: #6366f1; }
.api-field input.ok  { border-color: #16a34a; background: #f0fdf4; }
.api-field input.err { border-color: #dc2626; background: #fef2f2; }
.api-actions { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
.btn-save {
    padding: 10px 22px; background: #4f46e5; color: white;
    border: none; border-radius: 8px; font-size: 0.9rem;
    font-weight: 600; cursor: pointer;
}
.btn-save:hover { background: #4338ca; }
.api-status {
    font-size: 0.85rem; padding: 6px 14px;
    border-radius: 20px; font-weight: 600;
}
.api-status.ok   { background: #dcfce7; color: #15803d; }
.api-status.warn { background: #fef9c3; color: #854d0e; }

/* 디버그 패널 */
.debug-box {
    background: #1e293b; color: #94a3b8; border-radius: 10px;
    padding: 14px 18px; margin: 0 auto 16px; max-width: 1200px;
    font-family: monospace; font-size: 0.82rem;
    max-height: 120px; overflow-y: auto; display: none;
}
.debug-box.show { display: block; }
.debug-line { margin-bottom: 4px; }
.debug-line.ok   { color: #4ade80; }
.debug-line.err  { color: #f87171; }
.debug-line.warn { color: #fbbf24; }
.debug-line.info { color: #60a5fa; }

/* 메인 */
.main {
    display: grid; grid-template-columns: 3fr 2fr; gap: 20px;
    padding: 0 20px 20px; max-width: 1200px; margin: 0 auto;
}
@media (max-width: 900px) { .main { grid-template-columns: 1fr; } }
.panel {
    background: white; border-radius: 14px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.08); overflow: hidden;
}
.panel-header {
    padding: 14px 18px; background: #f8fafc;
    border-bottom: 1px solid #e2e8f0;
    display: flex; justify-content: space-between; align-items: center;
}
.panel-header h2 { font-size: 1rem; color: #374151; font-weight: 700; }
.count-badge {
    background: #e0e7ff; color: #3730a3;
    font-size: 0.8rem; font-weight: 700;
    padding: 3px 12px; border-radius: 20px;
}
#map { width: 100%; height: 560px; z-index: 1; }
.list-wrap { max-height: 560px; overflow-y: auto; padding: 14px; }

/* 로딩 */
.loading-wrap {
    display: none; text-align: center; padding: 40px 20px;
}
.loading-wrap.show { display: block; }
.spinner {
    width: 36px; height: 36px; border: 4px solid #e2e8f0;
    border-top-color: #1d4ed8; border-radius: 50%;
    animation: spin 0.8s linear infinite; margin: 0 auto 12px;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* 카드 */
.apt-card {
    border: 1.5px solid #e5e7eb; border-radius: 10px;
    padding: 15px; margin-bottom: 10px; cursor: pointer; transition: all 0.2s;
}
.apt-card:hover {
    border-color: #6366f1;
    box-shadow: 0 4px 16px rgba(99,102,241,0.15);
    transform: translateY(-1px);
}
.card-top {
    display: flex; justify-content: space-between;
    align-items: flex-start; gap: 10px; margin-bottom: 6px;
}
.apt-name { font-weight: 700; font-size: 0.95rem; }
.apt-addr { font-size: 0.82rem; color: #64748b; margin-bottom: 10px; }
.badge {
    padding: 3px 10px; border-radius: 20px;
    font-size: 0.75rem; font-weight: 700; white-space: nowrap;
}
.badge-y { background: #dcfce7; color: #15803d; }
.badge-n { background: #fee2e2; color: #b91c1c; }
.stats {
    display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px;
}
.stat { text-align: center; background: #f8fafc; border-radius: 7px; padding: 7px 4px; }
.sv { font-size: 1rem; font-weight: 700; color: #1d4ed8; }
.sl { font-size: 0.7rem; color: #94a3b8; margin-top: 2px; }

.empty { text-align: center; padding: 50px 20px; color: #94a3b8; }
.empty .icon { font-size: 3rem; margin-bottom: 12px; }

.toast {
    position: fixed; bottom: 24px; left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: #1e293b; color: white; padding: 12px 24px;
    border-radius: 25px; font-size: 0.9rem; z-index: 9999;
    transition: transform 0.3s; box-shadow: 0 4px 20px rgba(0,0,0,0.3);
    max-width: 90vw; text-align: center;
}
.toast.show { transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<header class="header">
    <h1>🔌 아파트 전기차 충전기 현황</h1>
    <div class="search-row">
        <input type="text" id="searchInput" placeholder="아파트 단지명 입력 (예: 래미안, 힐스테이트)">
        <select id="regionSelect">
            <option value="">전국</option>
            <option value="11">서울</option>
            <option value="41">경기</option>
            <option value="26">부산</option>
            <option value="27">대구</option>
            <option value="28">인천</option>
        </select>
        <button class="btn btn-search" onclick="performSearch()">🔍 검색</button>
        <button class="btn btn-demo"   onclick="loadDemo()">🧪 데모</button>
    </div>
</header>

<!-- API 키 설정 -->
<div style="padding:16px 20px 0;">
<div class="api-box">
    <div class="api-title">🔑 공공 API 키 설정</div>
    <div class="api-fields">
        <div class="api-field">
            <label>🏛️ 국토부 공동주택 API 키 (일반 인증키 - Decoding)</label>
            <input type="text" id="molitKey" placeholder="data.go.kr에서 복사한 인증키 붙여넣기">
        </div>
        <div class="api-field">
            <label>🌿 환경부 전기차충전소 API 키 (일반 인증키 - Decoding)</label>
            <input type="text" id="envKey" placeholder="data.go.kr에서 복사한 인증키 붙여넣기">
        </div>
    </div>
    <div class="api-actions">
        <button class="btn-save" onclick="saveApiKeys()">💾 저장</button>
        <span class="api-status warn" id="apiStatus">⚠️ API 키 미설정</span>
    </div>
</div>
</div>

<!-- 디버그 패널 -->
<div class="debug-box" id="debugBox"></div>

<!-- 메인 -->
<main class="main">
    <div class="panel">
        <div class="panel-header">
            <h2>🗺️ 지도</h2>
            <span class="count-badge" id="mapCount">0개 단지</span>
        </div>
        <div id="map"></div>
    </div>
    <div class="panel">
        <div class="panel-header">
            <h2>📋 검색 결과</h2>
            <span class="count-badge" id="listCount">0건</span>
        </div>
        <div class="loading-wrap" id="loadingWrap">
            <div class="spinner"></div>
            <p style="color:#64748b;">검색 중...</p>
        </div>
        <div class="list-wrap" id="resultList">
            <div class="empty">
                <div class="icon">🏘️</div>
                <p>검색어를 입력하거나<br>🧪 데모 버튼으로 테스트하세요</p>
            </div>
        </div>
    </div>
</main>

<div class="toast" id="toast"></div>

<script>
'use strict';

// ============================================================
// 전역 변수 및 설정
// ============================================================
let leafletMap, markers = [], currentData = [];

// 🔧 핵심 수정: 다중 CORS 프록시 (자동 전환)
const PROXIES = [
    url => `https://corsproxy.io/?${encodeURIComponent(url)}`,
    url => `https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`,
    url => `https://cors-anywhere.herokuapp.com/${url}`
];

// ============================================================
// 초기화
// ============================================================
document.addEventListener('DOMContentLoaded', () => {
    loadSavedKeys();
    initMap();
    document.getElementById('searchInput')
        .addEventListener('keypress', e => { if (e.key === 'Enter') performSearch(); });
});

// ============================================================
// API 키 관리
// ============================================================
function isValidKey(key) {
    if (!key || typeof key !== 'string') return false;
    const trimmed = key.trim();
    if (trimmed.length < 20) return false;
    if (trimmed.includes('<') || trimmed.includes('DOCTYPE')) return false;
    if (trimmed.startsWith('http')) return false;
    return true;
}

function saveApiKeys() {
    const molitKey = document.getElementById('molitKey').value.trim();
    const envKey = document.getElementById('envKey').value.trim();
    
    if (!isValidKey(molitKey)) {
        showToast('❌ 국토부 API 키가 올바르지 않습니다');
        return;
    }
    if (!isValidKey(envKey)) {
        showToast('❌ 환경부 API 키가 올바르지 않습니다');
        return;
    }
    
    localStorage.setItem('apt_molit_key', molitKey);
    localStorage.setItem('apt_env_key', envKey);
    
    document.getElementById('molitKey').className = 'ok';
    document.getElementById('envKey').className = 'ok';
    document.getElementById('apiStatus').textContent = '✅ API 키 설정 완료';
    document.getElementById('apiStatus').className = 'api-status ok';
    
    showToast('✅ API 키 저장 완료!');
    addDebug('API 키 저장 완료', 'ok');
}

function loadSavedKeys() {
    const molitKey = localStorage.getItem('apt_molit_key') || '';
    const envKey = localStorage.getItem('apt_env_key') || '';
    
    if (isValidKey(molitKey)) {
        document.getElementById('molitKey').value = molitKey;
        document.getElementById('molitKey').className = 'ok';
    }
    if (isValidKey(envKey)) {
        document.getElementById('envKey').value = envKey;
        document.getElementById('envKey').className = 'ok';
    }
    
    if (isValidKey(molitKey) && isValidKey(envKey)) {
        document.getElementById('apiStatus').textContent = '✅ API 키 설정 완료';
        document.getElementById('apiStatus').className = 'api-status ok';
    }
}

// ============================================================
// 지도 초기화
// ============================================================
function initMap() {
    leafletMap = L.map('map').setView([37.5665, 126.9780], 8);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '© OpenStreetMap contributors',
        maxZoom: 19
    }).addTo(leafletMap);
    addDebug('지도 초기화 완료', 'ok');
}

// ============================================================
// 🔧 핵심 수정: 안전한 fetch 함수 (JSON 파싱 오류 해결)
// ============================================================
async function safeFetch(apiUrl, proxyIndex = 0) {
    if (proxyIndex >= PROXIES.length) {
        throw new Error('모든 CORS 프록시 실패');
    }

    const proxyUrl = PROXIES[proxyIndex](apiUrl);
    addDebug(`프록시 ${proxyIndex + 1} 시도중...`, 'info');

    try {
        const response = await fetch(proxyUrl);
        
        if (!response.ok) {
            addDebug(`HTTP ${response.status} 오류 → 다음 프록시 시도`, 'warn');
            return safeFetch(apiUrl, proxyIndex + 1);
        }

        // 🔧 핵심: JSON 파싱 전 텍스트로 먼저 받아서 검증
        const text = await response.text();
        
        // 에러 텍스트 감지
        const lowerText = text.toLowerCase().trim();
        if (
            lowerText.startsWith('unexpected') ||
            lowerText.startsWith('error') ||
            lowerText.startsWith('<!doctype') ||
            lowerText.includes('rate limit') ||
            text.trim() === ''
        ) {
            addDebug(`비정상 응답: "${text.substring(0, 50)}" → 다음 프록시 시도`, 'warn');
            return safeFetch(apiUrl, proxyIndex + 1);
        }

        // XML 에러 응답 감지 (공공데이터 API 특성)
        if (text.trim().startsWith('<')) {
            if (text.includes('SERVICE_KEY_IS_NOT_REGISTERED_ERROR')) {
                throw new Error('API 키가 승인되지 않았거나 잘못되었습니다');
            }
            if (text.includes('APPLICATION_ERROR')) {
                throw new Error('API 서버 오류가 발생했습니다');
            }
            addDebug(`XML 에러 응답 → 다음 프록시 시도`, 'warn');
            return safeFetch(apiUrl, proxyIndex + 1);
        }

        // JSON 파싱 시도
        try {
            const jsonData = JSON.parse(text);
            addDebug(`프록시 ${proxyIndex + 1} 성공!`, 'ok');
            return jsonData;
        } catch (parseError) {
            addDebug(`JSON 파싱 실패 → 다음 프록시 시도`, 'warn');
            return safeFetch(apiUrl, proxyIndex + 1);
        }

    } catch (fetchError) {
        addDebug(`네트워크 오류 → 다음 프록시 시도`, 'warn');
        return safeFetch(apiUrl, proxyIndex + 1);
    }
}

// ============================================================
// API 호출 함수들
// ============================================================
async function fetchApartments(keyword, key) {
    // 🔧 API 키 디코딩 처리 (이중 인코딩 방지)
    const safeKey = key.includes('%') ? decodeURIComponent(key) : key;
    
    const params = new URLSearchParams({
        serviceKey: safeKey,
        kaptName: keyword,
        pageIndex: 1,
        recordCountPerPage: 30,
        _type: 'json'
    });
    
    const apiUrl = `https://apis.data.go.kr/1613000/AptBasisInfoService1/getAptBasisInfo?${params}`;
    addDebug(`국토부 API 호출: ${keyword}`, 'info');
    
    const data = await safeFetch(apiUrl);
    
    const items = data?.response?.body?.items?.item;
    if (!items) {
        addDebug('검색 결과 없음', 'warn');
        return [];
    }
    
    const result = Array.isArray(items) ? items : [items];
    addDebug(`아파트 ${result.length}개 조회됨`, 'ok');
    return result;
}

async function fetchChargers(aptName, key) {
    const safeKey = key.includes('%') ? decodeURIComponent(key) : key;
    
    const params = new URLSearchParams({
        serviceKey: safeKey,
        statNm: aptName,
        pageNo: 1,
        numOfRows: 100,
        dataType: 'JSON'
    });
    
    const apiUrl = `https://apis.data.go.kr/B552584/EvCharger/getChargerInfo?${params}`;
    
    try {
        const data = await safeFetch(apiUrl);
        const items = data?.items?.item;
        return items ? (Array.isArray(items) ? items : [items]) : [];
    } catch {
        return [];
    }
}

// ============================================================
// 검색 실행
// ============================================================
async function performSearch() {
    const keyword = document.getElementById('searchInput').value.trim();
    if (!keyword) {
        showToast('⚠️ 검색어를 입력해주세요');
        return;
    }

    const molitKey = localStorage.getItem('apt_molit_key');
    const envKey = localStorage.getItem('apt_env_key');

    if (!isValidKey(molitKey) || !isValidKey(envKey)) {
        showToast('⚠️ API 키를 먼저 설정하세요\n(또는 🧪 데모 버튼 사용)');
        return;
    }

    showLoading(true);
    showDebug(true);
    clearDebug();
    addDebug(`검색 시작: "${keyword}"`, 'info');

    try {
        const apartments = await fetchApartments(keyword, molitKey);
        
        if (apartments.length === 0) {
            showToast('🔍 검색 결과가 없습니다');
            return;
        }

        const enrichedData = [];
        for (const apt of apartments) {
            const chargers = await fetchChargers(apt.kaptName, envKey);
            const totalParking = parseInt(apt.kaptdaCnt) || 0;
            const chargerCount = chargers.length;
            const ratio = totalParking > 0 
                ? parseFloat(((chargerCount / totalParking) * 100).toFixed(2))
                : 0;

            enrichedData.push({
                name: apt.kaptName,
                address: apt.kaptAddr || '',
                totalParking,
                chargerCount,
                ratio,
                hasChargers: chargerCount > 0,
                chargers
            });
        }

        currentData = enrichedData;
        renderList(currentData);
        showToast(`✅ ${currentData.length}개 단지 검색 완료`);

    } catch (error) {
        addDebug(`검색 오류: ${error.message}`, 'err');
        showToast(`❌ ${error.message}`);
    } finally {
        showLoading(false);
    }
}

// ============================================================
// UI 렌더링
// ============================================================
function renderList(data) {
    const container = document.getElementById('resultList');
    document.getElementById('listCount').textContent = `${data.length}건`;
    
    if (data.length === 0) {
        container.innerHTML = '<div class="empty"><div class="icon">🔍</div><p>결과 없음</p></div>';
        return;
    }

    container.innerHTML = data.map((apt, i) => `
        <div class="apt-card" onclick="focusApt(${i})">
            <div class="card-top">
                <div class="apt-name">🏢 ${apt.name}</div>
                <span class="badge ${apt.hasChargers ? 'badge-y' : 'badge-n'}">
                    ${apt.hasChargers ? `⚡ ${apt.chargerCount}기` : '❌ 없음'}
                </span>
            </div>
            <div class="apt-addr">📍 ${apt.address || '주소 정보 없음'}</div>
            <div class="stats">
                <div class="stat">
                    <div class="sv">${apt.totalParking.toLocaleString()}</div>
                    <div class="sl">총 주차면</div>
                </div>
                <div class="stat">
                    <div class="sv">${apt.chargerCount}</div>
                    <div class="sl">충전기 수</div>
                </div>
                <div class="stat">
                    <div class="sv">${apt.ratio}%</div>
                    <div class="sl">설치 비율</div>
                </div>
            </div>
        </div>
    `).join('');
}

function focusApt(index) {
    showToast(`선택: ${currentData[index].name}`);
}

// ============================================================
// 데모 데이터
// ============================================================
function loadDemo() {
    currentData = [
        { name: '래미안 강남포레스트', address: '서울특별시 강남구 일원동 641',
          totalParking: 1850, chargerCount: 8, ratio: 0.43, hasChargers: true },
        { name: '힐스테이트 판교역', address: '경기도 성남시 분당구 백현동 532',
          totalParking: 920, chargerCount: 4, ratio: 0.43, hasChargers: true },
        { name: '광교 아이파크', address: '경기도 수원시 영통구 이의동 1261',
          totalParking: 1340, chargerCount: 0, ratio: 0, hasChargers: false }
    ];
    
    renderList(currentData);
    document.getElementById('mapCount').textContent = `${currentData.length}개 단지`;
    showToast('🧪 데모 데이터 3개 단지 로드 완료');
}

// ============================================================
// 유틸리티 함수들
// ============================================================
function showLoading(show) {
    document.getElementById('loadingWrap').classList.toggle('show', show);
    document.getElementById('resultList').style.display = show ? 'none' : 'block';
}

function showToast(message) {
    const toast = document.getElementById('toast');
    toast.textContent = message;
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 3500);
}

function addDebug(message, type = 'info') {
    const box = document.getElementById('debugBox');
    const line = document.createElement('div');
    line.className = `debug-line ${type}`;
    line.textContent = `[${new Date().toLocaleTimeString()}] ${message}`;
    box.appendChild(line);
    box.scrollTop = box.scrollHeight;
}

function showDebug(show) {
    document.getElementById('debugBox').classList.toggle('show', show);
}

function clearDebug() {
    document.getElementById('debugBox').innerHTML = '';
}
</script>
</body>
</html>
