<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🔌 아파트 전기차 충전기 현황</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Malgun Gothic', sans-serif; background: #f1f5f9; color: #1e293b; }

/* 헤더 */
.header {
    background: linear-gradient(135deg, #1d4ed8, #0ea5e9);
    color: white; padding: 24px 20px; text-align: center;
    box-shadow: 0 4px 16px rgba(0,0,0,0.2);
}
.header h1 { font-size: 1.8rem; font-weight: 700; margin-bottom: 16px; }
.search-row {
    display: flex; gap: 10px; max-width: 800px;
    margin: 0 auto; flex-wrap: wrap; justify-content: center;
}
.search-row input {
    flex: 1; min-width: 260px; padding: 12px 16px;
    border: none; border-radius: 10px; font-size: 1rem; outline: none;
}
.search-row select {
    padding: 12px 14px; border: none; border-radius: 10px;
    font-size: 0.95rem; background: white; cursor: pointer;
}
.btn {
    padding: 12px 20px; border: none; border-radius: 10px;
    font-size: 0.95rem; font-weight: 600; cursor: pointer;
    transition: all 0.2s; white-space: nowrap;
}
.btn:hover { transform: translateY(-1px); }
.btn-search { background: #f59e0b; color: white; }
.btn-demo { background: #059669; color: white; }

/* API 키 설정 박스 */
.api-box {
    background: #fff7ed; border: 2px solid #fed7aa; border-radius: 12px;
    padding: 20px; margin: 16px auto; max-width: 1200px;
}
.api-title {
    font-weight: 700; color: #c2410c; font-size: 1rem;
    margin-bottom: 14px; display: flex; align-items: center; gap: 8px;
}
.api-fields {
    display: grid; grid-template-columns: 1fr 1fr;
    gap: 16px; margin-bottom: 14px;
}
@media (max-width: 600px) { .api-fields { grid-template-columns: 1fr; } }

.api-field label {
    display: block; font-size: 0.85rem; font-weight: 700;
    color: #374151; margin-bottom: 6px;
}
.api-field .sub {
    font-size: 0.75rem; color: #6b7280;
    font-weight: 400; margin-left: 4px;
}
.api-field input {
    width: 100%; padding: 10px 14px; border: 1.5px solid #d1d5db;
    border-radius: 8px; font-size: 0.9rem; transition: border-color 0.2s;
}
.api-field input:focus {
    outline: none; border-color: #6366f1;
    box-shadow: 0 0 0 3px rgba(99,102,241,0.1);
}
.api-field input.saved { border-color: #16a34a; background: #f0fdf4; }

.api-actions { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
.btn-save {
    padding: 10px 22px; background: #4f46e5; color: white;
    border: none; border-radius: 8px; font-size: 0.9rem;
    font-weight: 600; cursor: pointer; transition: all 0.2s;
}
.btn-save:hover { background: #4338ca; }

.api-status {
    font-size: 0.85rem; padding: 6px 14px;
    border-radius: 20px; font-weight: 600;
}
.api-status.ok { background: #dcfce7; color: #15803d; }
.api-status.warn { background: #fef9c3; color: #854d0e; }

/* 메인 레이아웃 */
.main {
    display: grid; grid-template-columns: 3fr 2fr; gap: 20px;
    padding: 0 20px 20px; max-width: 1200px; margin: 0 auto;
}
@media (max-width: 900px) { .main { grid-template-columns: 1fr; } }

.panel {
    background: white; border-radius: 14px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.08); overflow: hidden;
}
.panel-header {
    padding: 14px 18px; background: #f8fafc;
    border-bottom: 1px solid #e2e8f0;
    display: flex; justify-content: space-between; align-items: center;
}
.panel-header h2 { font-size: 1rem; color: #374151; font-weight: 700; }
.count-badge {
    background: #e0e7ff; color: #3730a3; font-size: 0.8rem;
    font-weight: 700; padding: 3px 12px; border-radius: 20px;
}

/* 지도 */
#map { width: 100%; height: 560px; z-index: 1; }

/* 목록 */
.list-wrap { max-height: 560px; overflow-y: auto; padding: 14px; }
.apt-card {
    border: 1.5px solid #e5e7eb; border-radius: 10px;
    padding: 15px; margin-bottom: 10px; cursor: pointer; transition: all 0.2s;
}
.apt-card:hover {
    border-color: #6366f1; box-shadow: 0 4px 16px rgba(99,102,241,0.15);
    transform: translateY(-1px);
}
.apt-card.active { border-color: #1d4ed8; background: #eff6ff; }

.card-top {
    display: flex; justify-content: space-between;
    align-items: flex-start; gap: 10px; margin-bottom: 6px;
}
.apt-name { font-weight: 700; font-size: 0.95rem; }
.apt-addr { font-size: 0.82rem; color: #64748b; margin-bottom: 10px; }

.badge {
    padding: 3px 10px; border-radius: 20px;
    font-size: 0.75rem; font-weight: 700; white-space: nowrap;
}
.badge-y { background: #dcfce7; color: #15803d; }
.badge-n { background: #fee2e2; color: #b91c1c; }

.stats {
    display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px;
}
.stat {
    text-align: center; background: #f8fafc;
    border-radius: 7px; padding: 7px 4px;
}
.sv { font-size: 1rem; font-weight: 700; color: #1d4ed8; }
.sl { font-size: 0.7rem; color: #94a3b8; margin-top: 2px; }

/* 빈 상태 */
.empty { text-align: center; padding: 50px 20px; color: #94a3b8; }
.empty .icon { font-size: 3rem; margin-bottom: 12px; }

/* 토스트 */
.toast {
    position: fixed; bottom: 24px; left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: #1e293b; color: white; padding: 12px 24px;
    border-radius: 25px; font-size: 0.9rem; z-index: 9999;
    transition: transform 0.3s; box-shadow: 0 4px 20px rgba(0,0,0,0.3);
}
.toast.show { transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<!-- 헤더 -->
<header class="header">
    <h1>🔌 아파트 전기차 충전기 현황</h1>
    <div class="search-row">
        <input type="text" id="searchInput" placeholder="아파트 단지명 입력 (예: 래미안, 힐스테이트)">
        <select id="regionSelect">
            <option value="">전국</option>
            <option value="11">서울</option>
            <option value="41">경기</option>
            <option value="26">부산</option>
            <option value="27">대구</option>
            <option value="28">인천</option>
        </select>
        <button class="btn btn-search" onclick="performSearch()">🔍 검색</button>
        <button class="btn btn-demo" onclick="loadDemo()">🧪 데모</button>
    </div>
</header>

<!-- ✅ API 키 설정 박스 (여기에 키 입력!) -->
<div style="padding: 16px 20px 0;">
    <div class="api-box">
        <div class="api-title">
            🔑 공공 API 키 설정
            <span style="font-size:0.8rem; font-weight:400; color:#6b7280;">
                — 처음 한 번만 입력하면 브라우저에 저장됩니다
            </span>
        </div>

        <div class="api-fields">
            <!-- 👇 국토부 API 키 입력란 -->
            <div class="api-field">
                <label>
                    🏛️ 국토부 공동주택 API 키
                    <span class="sub">(data.go.kr → "공동주택관리정보시스템" 검색)</span>
                </label>
                <input type="text" id="molitKey" 
                       placeholder="국토부 API 인증키를 여기에 붙여넣기"
                       oninput="checkKeyStatus()" />
            </div>

            <!-- 👇 환경부 API 키 입력란 -->
            <div class="api-field">
                <label>
                    🌿 환경부 전기차충전소 API 키
                    <span class="sub">(data.go.kr → "전기자동차충전소 정보" 검색)</span>
                </label>
                <input type="text" id="envKey"
                       placeholder="환경부 API 인증키를 여기에 붙여넣기"
                       oninput="checkKeyStatus()" />
            </div>
        </div>

        <div class="api-actions">
            <button class="btn-save" onclick="saveApiKeys()">💾 API 키 저장 후 사용</button>
            <span class="api-status warn" id="apiStatus">⚠️ API 키 미설정</span>
            <span style="font-size:0.8rem; color:#6b7280;">
                💡 API 키 없이 테스트하려면 <strong>🧪 데모</strong> 버튼 클릭
            </span>
        </div>
    </div>
</div>

<!-- 메인 -->
<main class="main">
    <div class="panel">
        <div class="panel-header">
            <h2>🗺️ 지도 (OpenStreetMap)</h2>
            <span class="count-badge" id="mapCount">0개 단지</span>
        </div>
        <div id="map"></div>
    </div>

    <div class="panel">
        <div class="panel-header">
            <h2>📋 검색 결과</h2>
            <span class="count-badge" id="listCount">0건</span>
        </div>
        <div class="list-wrap" id="resultList">
            <div class="empty">
                <div class="icon">🏘️</div>
                <p>검색어를 입력하거나<br>🧪 데모 버튼으로 테스트하세요</p>
            </div>
        </div>
    </div>
</main>

<div class="toast" id="toast"></div>

<script>
// 전역 변수
let leafletMap, markers = [], currentData = [];

// 초기화
document.addEventListener('DOMContentLoaded', function () {
    // 저장된 API 키 불러와서 입력란에 자동 표시
    const savedMolit = localStorage.getItem('apt_molit_key') || '';
    const savedEnv = localStorage.getItem('apt_env_key') || '';

    if (savedMolit) {
        document.getElementById('molitKey').value = savedMolit;
        document.getElementById('molitKey').classList.add('saved');
    }
    if (savedEnv) {
        document.getElementById('envKey').value = savedEnv;
        document.getElementById('envKey').classList.add('saved');
    }

    checkKeyStatus();
    initMap();

    // 엔터키 검색
    document.getElementById('searchInput')
        .addEventListener('keypress', e => { if (e.key === 'Enter') performSearch(); });
});

// ✅ API 키 저장 함수
function saveApiKeys() {
    const molit = document.getElementById('molitKey').value.trim();
    const env = document.getElementById('envKey').value.trim();

    if (!molit) { showToast('⚠️ 국토부 API 키를 입력해주세요'); return; }
    if (!env) { showToast('⚠️ 환경부 API 키를 입력해주세요'); return; }

    // localStorage에 저장
    localStorage.setItem('apt_molit_key', molit);
    localStorage.setItem('apt_env_key', env);

    // 입력란 색상 변경 (저장됨 표시)
    document.getElementById('molitKey').classList.add('saved');
    document.getElementById('envKey').classList.add('saved');

    checkKeyStatus();
    showToast('✅ API 키가 저장되었습니다. 이제 검색하세요!');
}

// API 키 상태 표시
function checkKeyStatus() {
    const molit = document.getElementById('molitKey').value.trim();
    const env = document.getElementById('envKey').value.trim();
    const status = document.getElementById('apiStatus');

    if (molit && env) {
        status.textContent = '✅ API 키 설정 완료';
        status.className = 'api-status ok';
    } else {
        status.textContent = '⚠️ API 키 미설정';
        status.className = 'api-status warn';
    }
}

// 지도 초기화 (Leaflet + OpenStreetMap)
function initMap() {
    leafletMap = L.map('map').setView([37.5665, 126.9780], 8);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '© <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>',
        maxZoom: 19
    }).addTo(leafletMap);
}

// ✅ 검색 실행 (국토부 API 연동)
async function performSearch() {
    const keyword = document.getElementById('searchInput').value.trim();
    if (!keyword) { showToast('⚠️ 검색어를 입력해주세요'); return; }

    // localStorage에서 API 키 가져오기
    const molitKey = localStorage.getItem('apt_molit_key');
    const envKey = localStorage.getItem('apt_env_key');

    if (!molitKey || !envKey) {
        showToast('⚠️ 위의 API 키 입력란에 키를 입력하고 저장하세요');
        return;
    }

    showToast('🔍 검색 중...');

    try {
        // 국토부 API로 아파트 목록 조회
        const apts = await fetchApartments(keyword, molitKey);
        
        if (apts.length === 0) {
            showToast('🔍 검색 결과가 없습니다');
            return;
        }

        // 각 아파트의 충전기 정보 조회
        const enriched = [];
        for (let apt of apts) {
            const data = await enrichData(apt, envKey);
            enriched.push(data);
        }

        currentData = enriched;
        renderList(currentData);
        plotMarkers(currentData);
        showToast(`✅ ${currentData.length}개 단지 검색 완료`);

    } catch (err) {
        console.error(err);
        showToast('❌ 오류 발생 — 콘솔(F12)을 확인하세요');
    }
}

// 국토부 API 호출
async function fetchApartments(keyword, key) {
    const params = new URLSearchParams({
        serviceKey: key,
        kaptName: keyword,
        pageIndex: 1,
        recordCountPerPage: 30,
        _type: 'json'
    });

    const apiUrl = `https://apis.data.go.kr/1613000/AptBasisInfoService1/getAptBasisInfo?${params}`;
    const proxyUrl = `https://api.allorigins.win/raw?url=${encodeURIComponent(apiUrl)}`;

    const res = await fetch(proxyUrl);
    const data = await res.json();
    const items = data?.response?.body?.items?.item;

    if (!items) return [];
    return Array.isArray(items) ? items : [items];
}

// 환경부 충전소 API 호출
async function fetchChargers(aptName, key) {
    const params = new URLSearchParams({
        serviceKey: key,
        statNm: aptName,
        pageNo: 1,
        numOfRows: 100,
        dataType: 'JSON'
    });

    const apiUrl = `https://apis.data.go.kr/B552584/EvCharger/getChargerInfo?${params}`;
    const proxyUrl = `https://api.allorigins.win/raw?url=${encodeURIComponent(apiUrl)}`;

    try {
        const res = await fetch(proxyUrl);
        const data = await res.json();
        const items = data?.items?.item;
        if (!items) return [];
        return Array.isArray(items) ? items : [items];
    } catch { return []; }
}

// 아파트 데이터 보강
async function enrichData(apt, envKey) {
    const chargers = await fetchChargers(apt.kaptName, envKey);
    const totalParking = parseInt(apt.kaptdaCnt) || 0;
    const chargerCount = chargers.length;
    const ratio = totalParking > 0 ? ((chargerCount / totalParking) * 100).toFixed(2) : 0;

    return {
        name: apt.kaptName,
        address: apt.kaptAddr || '',
        totalParking,
        chargerCount,
        ratio: parseFloat(ratio),
        hasChargers: chargerCount > 0,
        chargers: chargers
    };
}

// 목록 렌더링
function renderList(data) {
    const el = document.getElementById('resultList');
    document.getElementById('listCount').textContent = `${data.length}건`;

    if (!data.length) {
        el.innerHTML = `<div class="empty"><div class="icon">🔍</div><p>결과 없음</p></div>`;
        return;
    }

    el.innerHTML = data.map((apt, i) => `
        <div class="apt-card" onclick="focusApt(${i})">
            <div class="card-top">
                <div class="apt-name">🏢 ${apt.name}</div>
                <span class="badge ${apt.hasChargers ? 'badge-y' : 'badge-n'}">
                    ${apt.hasChargers ? `⚡ ${apt.chargerCount}기` : '❌ 없음'}
                </span>
            </div>
            <div class="apt-addr">📍 ${apt.address || '주소 정보 없음'}</div>
            <div class="stats">
                <div class="stat">
                    <div class="sv">${apt.totalParking.toLocaleString()}</div>
                    <div class="sl">총 주차면</div>
                </div>
                <div class="stat">
                    <div class="sv">${apt.chargerCount}</div>
                    <div class="sl">충전기 수</div>
                </div>
                <div class="stat">
                    <div class="sv">${apt.ratio}%</div>
                    <div class="sl">설치 비율</div>
                </div>
            </div>
        </div>
    `).join('');
}

// 지도 마커 표시
function plotMarkers(data) {
    // 마커 표시 로직 (간소화)
    document.getElementById('mapCount').textContent = `${data.length}개 단지`;
}

function focusApt(i) {
    showToast(`선택: ${currentData[i].name}`);
}

// 데모 데이터
function loadDemo() {
    currentData = [
        { name: '래미안 강남포레스트', address: '서울특별시 강남구 일원동 641',
          totalParking: 1850, chargerCount: 8, ratio: 0.43, hasChargers: true },
        { name: '힐스테이트 판교역', address: '경기도 성남시 분당구 백현동 532',
          totalParking: 920, chargerCount: 4, ratio: 0.43, hasChargers: true },
        { name: '광교 아이파크', address: '경기도 수원시 영통구 이의동 1261',
          totalParking: 1340, chargerCount: 0, ratio: 0, hasChargers: false }
    ];
    renderList(currentData);
    showToast('🧪 데모 3개 단지 로드 완료');
}

// 토스트 표시
function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 3000);
}
</script>
</body>
</html>
