<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>아파트 전기차 충전기 현황</title>
    <link rel="stylesheet" href="styles.css">
    <script type="text/javascript" 
            src="//dapi.kakao.com/v2/maps/sdk.js?appkey=YOUR_KAKAO_API_KEY&libraries=services">
    </script>
</head>
<body>
    <!-- 헤더 -->
    <header class="header">
        <h1>🔌 아파트 전기차 충전기 현황</h1>
        <div class="search-container">
            <input type="text" id="searchInput" placeholder="아파트 단지명 또는 주소 입력">
            <select id="regionSelect">
                <option value="">전국</option>
                <option value="11">서울</option>
                <option value="26">부산</option>
                <!-- 기타 지역 코드 -->
            </select>
            <button onclick="performSearch()">검색</button>
        </div>
    </header>

    <!-- 메인 컨텐츠 -->
    <main class="main-content">
        <div class="content-grid">
            <!-- 지도 영역 -->
            <section class="map-section">
                <div id="kakaoMap"></div>
                <div class="map-controls">
                    <button onclick="toggleView('map')">지도 보기</button>
                    <button onclick="toggleView('list')">목록 보기</button>
                </div>
            </section>
            
            <!-- 목록 영역 -->
            <section class="list-section">
                <div class="filter-bar">
                    <select id="sortBy" onchange="applySorting()">
                        <option value="name">단지명순</option>
                        <option value="ratio_desc">설치비율 높은순</option>
                        <option value="count_desc">충전기수 많은순</option>
                    </select>
                    <select id="filterEV" onchange="applyFiltering()">
                        <option value="all">전체</option>
                        <option value="has_ev">충전기 있음</option>
                        <option value="no_ev">충전기 없음</option>
                    </select>
                </div>
                <div id="resultsList"></div>
            </section>
        </div>
    </main>

    <!-- 상세 정보 모달 -->
    <div id="detailModal" class="modal hidden">
        <div class="modal-content">
            <span class="close-btn" onclick="closeModal()">&times;</span>
            <div id="detailContent"></div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
