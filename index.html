<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🔌 아파트 전기차 충전기 현황 (V4 완전판)</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Malgun Gothic', sans-serif; background: #f1f5f9; color: #1e293b; }

.header {
    background: linear-gradient(135deg, #1d4ed8, #0ea5e9);
    color: white; padding: 24px 20px; text-align: center;
    box-shadow: 0 4px 16px rgba(0,0,0,0.2);
}
.header h1 { font-size: 1.8rem; font-weight: 700; margin-bottom: 16px; }
.search-row {
    display: flex; gap: 12px; max-width: 800px;
    margin: 0 auto; flex-wrap: wrap; justify-content: center;
}
.search-row input {
    flex: 1; min-width: 280px; padding: 12px 16px;
    border: none; border-radius: 10px; font-size: 1rem; outline: none;
}
.search-row select {
    padding: 12px 14px; border: none; border-radius: 10px;
    font-size: 0.95rem; background: white; cursor: pointer;
}
.btn {
    padding: 12px 20px; border: none; border-radius: 10px;
    font-size: 0.95rem; font-weight: 600; cursor: pointer;
    transition: all 0.2s; white-space: nowrap;
}
.btn:hover { transform: translateY(-1px); opacity: 0.9; }
.btn-search { background: #f59e0b; color: white; }
.btn-demo { background: #059669; color: white; }

/* API 설정 */
.api-box {
    background: #fff7ed; border: 2px solid #fed7aa; border-radius: 12px;
    padding: 20px; margin: 16px auto; max-width: 1200px;
}
.api-title { font-weight: 700; color: #c2410c; margin-bottom: 14px; }
.api-fields { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 14px; }
@media (max-width: 600px) { .api-fields { grid-template-columns: 1fr; } }
.api-field label {
    display: block; font-size: 0.85rem; font-weight: 700;
    color: #374151; margin-bottom: 6px;
}
.api-field input {
    width: 100%; padding: 10px 14px; border: 1.5px solid #d1d5db;
    border-radius: 8px; font-size: 0.85rem; transition: border-color 0.2s;
}
.api-field input.ok { border-color: #16a34a; background: #f0fdf4; }
.api-field input.err { border-color: #dc2626; background: #fef2f2; }
.btn-save {
    padding: 10px 22px; background: #4f46e5; color: white;
    border: none; border-radius: 8px; font-size: 0.9rem;
    font-weight: 600; cursor: pointer; margin-right: 10px;
}
.api-status { font-size: 0.85rem; padding: 6px 14px; border-radius: 20px; font-weight: 600; }
.api-status.ok { background: #dcfce7; color: #15803d; }
.api-status.warn { background: #fef9c3; color: #854d0e; }

/* 디버그 패널 */
.debug-box {
    background: #0f172a; color: #94a3b8; border-radius: 10px;
    padding: 12px 16px; margin: 0 auto 16px; max-width: 1200px;
    font-family: 'Consolas', monospace; font-size: 0.8rem;
    max-height: 180px; overflow-y: auto; display: none;
}
.debug-box.show { display: block; }
.d-ok { color: #4ade80; }
.d-err { color: #f87171; }
.d-warn { color: #fbbf24; }
.d-info { color: #60a5fa; }

/* 메인 */
.main {
    display: grid; grid-template-columns: 3fr 2fr; gap: 20px;
    padding: 0 20px 20px; max-width: 1200px; margin: 0 auto;
}
@media (max-width: 900px) { .main { grid-template-columns: 1fr; } }
.panel {
    background: white; border-radius: 14px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.08); overflow: hidden;
}
.panel-header {
    padding: 14px 18px; background: #f8fafc; border-bottom: 1px solid #e2e8f0;
    display: flex; justify-content: space-between; align-items: center;
}
.panel-header h2 { font-size: 1rem; color: #374151; font-weight: 700; }
.count-badge {
    background: #e0e7ff; color: #3730a3; font-size: 0.8rem;
    font-weight: 700; padding: 3px 12px; border-radius: 20px;
}
#map { width: 100%; height: 580px; z-index: 1; }
.list-wrap { max-height: 580px; overflow-y: auto; padding: 14px; }

.loading-wrap { display: none; text-align: center; padding: 40px; }
.loading-wrap.show { display: block; }
.spinner {
    width: 36px; height: 36px; border: 4px solid #e2e8f0;
    border-top-color: #1d4ed8; border-radius: 50%;
    animation: spin 0.8s linear infinite; margin: 0 auto 12px;
}
@keyframes spin { to { transform: rotate(360deg); } }

.apt-card {
    border: 1.5px solid #e5e7eb; border-radius: 10px;
    padding: 15px; margin-bottom: 10px; cursor: pointer; transition: all 0.2s;
}
.apt-card:hover {
    border-color: #6366f1; box-shadow: 0 4px 16px rgba(99,102,241,0.15);
    transform: translateY(-1px);
}
.apt-card.active { border-color: #1d4ed8; background: #eff6ff; }
.card-top {
    display: flex; justify-content: space-between;
    align-items: flex-start; gap: 10px; margin-bottom: 6px;
}
.apt-name { font-weight: 700; font-size: 0.95rem; }
.apt-addr { font-size: 0.82rem; color: #64748b; margin-bottom: 10px; }
.badge { padding: 3px 10px; border-radius: 20px; font-size: 0.75rem; font-weight: 700; }
.badge-y { background: #dcfce7; color: #15803d; }
.badge-n { background: #fee2e2; color: #b91c1c; }
.stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; }
.stat { text-align: center; background: #f8fafc; border-radius: 7px; padding: 7px 4px; }
.sv { font-size: 1rem; font-weight: 700; color: #1d4ed8; }
.sl { font-size: 0.7rem; color: #94a3b8; margin-top: 2px; }

.progress-bar {
    width: 100%; height: 6px; background: #e5e7eb;
    border-radius: 3px; margin-top: 10px; overflow: hidden;
}
.progress-fill {
    height: 100%; background: linear-gradient(90deg, #16a34a, #4ade80);
    transition: width 0.5s ease;
}

.empty { text-align: center; padding: 50px 20px; color: #94a3b8; }
.empty .icon { font-size: 3rem; margin-bottom: 12px; }

.toast {
    position: fixed; bottom: 24px; left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: #1e293b; color: white; padding: 12px 24px;
    border-radius: 25px; font-size: 0.9rem; z-index: 9999;
    transition: transform 0.3s; box-shadow: 0 4px 20px rgba(0,0,0,0.3);
}
.toast.show { transform: translateX(-50%) translateY(0); }

/* 모달 */
.modal-overlay {
    display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5);
    z-index: 1000; justify-content: center; align-items: center; padding: 20px;
}
.modal-overlay.show { display: flex; }
.modal {
    background: white; border-radius: 16px; padding: 24px;
    max-width: 800px; width: 100%; max-height: 85vh; overflow-y: auto; position: relative;
}
.modal-close {
    position: absolute; top: 16px; right: 16px; background: #f1f5f9;
    border: none; border-radius: 50%; width: 32px; height: 32px;
    cursor: pointer; font-size: 1.1rem;
}
.modal h2 { font-size: 1.2rem; margin-bottom: 6px; }
.modal-addr { color: #64748b; font-size: 0.9rem; margin-bottom: 20px; }
.modal-section { margin-bottom: 20px; }
.modal-section h3 {
    font-size: 0.95rem; color: #374151; font-weight: 700; margin-bottom: 10px;
    padding-bottom: 6px; border-bottom: 1px solid #e5e7eb;
}
.info-table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
.info-table th, .info-table td {
    padding: 8px 12px; text-align: left; border-bottom: 1px solid #f1f5f9;
}
.info-table th { background: #f8fafc; color: #64748b; font-weight: 600; }
.charger-table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
.charger-table th {
    background: #f8fafc; padding: 8px 10px; text-align: left;
    color: #64748b; font-weight: 600; border-bottom: 1px solid #e5e7eb;
}
.charger-table td {
    padding: 8px 10px; border-bottom: 1px solid #f1f5f9; color: #374151;
}
.charger-table tr:hover td { background: #f8fafc; }
.loc-badge {
    padding: 2px 8px; border-radius: 10px; font-size: 0.75rem; font-weight: 600;
}
.loc-underground { background: #e0e7ff; color: #3730a3; }
.loc-ground { background: #dcfce7; color: #15803d; }
.loc-unknown { background: #f1f5f9; color: #64748b; }
</style>

<body>

<header class="header">
    <h1>🔌 아파트 전기차 충전기 현황 (V4)</h1>
    <div class="search-row">
        <input type="text" id="searchInput" placeholder="아파트 단지명 입력 (예: 래미안, 힐스테이트)">
        <select id="regionSelect">
            <option value="">전국</option>
            <option value="11">서울</option>
            <option value="41">경기</option>
            <option value="26">부산</option>
            <option value="27">대구</option>
            <option value="28">인천</option>
        </select>
        <button class="btn btn-search" onclick="performSearch()">🔍 검색</button>
        <button class="btn btn-demo" onclick="loadDemo()">🧪 데모</button>
    </div>
</header>

<div style="padding:16px 20px 0;">
    <div class="api-box">
        <div class="api-title">🔑 공공 API 키 설정 (data.go.kr → 마이페이지 → 일반 인증키 Decoding)</div>
        <div class="api-fields">
            <div class="api-field">
                <label>🏛️ 국토부 공동주택 API 키 (AptBasisInfoServiceV4)</label>
                <input type="text" id="molitKey" placeholder="일반 인증키(Decoding) 붙여넣기">
            </div>
            <div class="api-field">
                <label>🌿 환경공단 전기차충전소 API 키 (EvCharger)</label>
                <input type="text" id="envKey" placeholder="일반 인증키(Decoding) 붙여넣기">
            </div>
        </div>
        <div style="display:flex;align-items:center;gap:12px;flex-wrap:wrap;">
            <button class="btn-save" onclick="saveApiKeys()">💾 저장</button>
            <span class="api-status warn" id="apiStatus">⚠️ API 키 미설정</span>
            <span style="font-size:0.8rem;color:#6b7280;">
                💡 키 없이 테스트: <strong>🧪 데모</strong> 버튼
            </span>
        </div>
    </div>
</div>

<!-- 디버그 패널 -->
<div class="debug-box" id="debugBox"></div>

<main class="main">
    <div class="panel">
        <div class="panel-header">
            <h2>🗺️ OpenStreetMap</h2>
            <span class="count-badge" id="mapCount">0개 단지</span>
        </div>
        <div id="map"></div>
    </div>
    <div class="panel">
        <div class="panel-header">
            <h2>📋 검색 결과</h2>
            <span class="count-badge" id="listCount">0건</span>
        </div>
        <div class="loading-wrap" id="loadingWrap">
            <div class="spinner"></div>
            <p style="color:#64748b;">API 조회 중...</p>
        </div>
        <div class="list-wrap" id="resultList">
            <div class="empty">
                <div class="icon">🏘️</div>
                <p>검색어를 입력하거나<br>🧪 데모 버튼으로 테스트하세요</p>
            </div>
        </div>
    </div>
</main>

<!-- 상세 모달 -->
<div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
    <div class="modal" onclick="event.stopPropagation()">
        <button class="modal-close" onclick="closeModal()">✕</button>
        <div id="modalBody"></div>
    </div>
</div>

<div class="toast" id="toast"></div>

<script>
'use strict';

// ============================================================
// 전역 변수
// ============================================================
let leafletMap, markers = [], currentData = [];

// 다중 CORS 프록시 (장애 대응)
const PROXIES = [
    u => `https://corsproxy.io/?${encodeURIComponent(u)}`,
    u => `https://api.allorigins.win/raw?url=${encodeURIComponent(u)}`,
];

// 충전기 타입 코드표
const CHARGER_TYPES = {
    '01': 'DC차데모', '02': 'AC완속', '03': 'DC차데모+AC3상', '04': 'DC콤보',
    '05': 'DC차데모+DC콤보', '06': 'DC차데모+AC3상+DC콤보', '07': 'AC3상',
    '08': 'DC콤보(완속)', '09': 'H2(수소)', '10': 'NACS'
};

// ============================================================
// 초기화
// ============================================================
document.addEventListener('DOMContentLoaded', () => {
    loadSavedKeys();
    initMap();
    document.getElementById('searchInput')
        .addEventListener('keypress', e => { if (e.key === 'Enter') performSearch(); });
});

function initMap() {
    leafletMap = L.map('map').setView([37.5665, 126.9780], 8);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '© <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>',
        maxZoom: 19
    }).addTo(leafletMap);
}

// ============================================================
// API 키 관리
// ============================================================
function isValidKey(k) {
    return k && k.length > 20 && !k.includes('<') && !k.includes('DOCTYPE') && !k.startsWith('http');
}

function saveApiKeys() {
    const mk = document.getElementById('molitKey').value.trim();
    const ek = document.getElementById('envKey').value.trim();
    
    if (!isValidKey(mk)) { showToast('❌ 국토부 API 키가 올바르지 않습니다'); return; }
    if (!isValidKey(ek)) { showToast('❌ 환경부 API 키가 올바르지 않습니다'); return; }
    
    localStorage.setItem('apt_molit_key', mk);
    localStorage.setItem('apt_env_key', ek);
    
    document.getElementById('molitKey').className = 'ok';
    document.getElementById('envKey').className = 'ok';
    document.getElementById('apiStatus').textContent = '✅ 설정 완료';
    document.getElementById('apiStatus').className = 'api-status ok';
    
    showToast('✅ API 키 저장 완료!');
}

function loadSavedKeys() {
    const mk = localStorage.getItem('apt_molit_key') || '';
    const ek = localStorage.getItem('apt_env_key') || '';
    
    if (isValidKey(mk)) {
        document.getElementById('molitKey').value = mk;
        document.getElementById('molitKey').className = 'ok';
    }
    if (isValidKey(ek)) {
        document.getElementById('envKey').value = ek;
        document.getElementById('envKey').className = 'ok';
    }
    
    if (isValidKey(mk) && isValidKey(ek)) {
        document.getElementById('apiStatus').textContent = '✅ 설정 완료';
        document.getElementById('apiStatus').className = 'api-status ok';
    }
}

// ============================================================
// 🔧 핵심: XML/JSON 하이브리드 파서
// ============================================================
async function fetchPublicDataAPI(apiUrl, sourceName, proxyIndex = 0) {
    if (proxyIndex >= PROXIES.length) {
        throw new Error('모든 CORS 프록시 실패');
    }

    const proxyUrl = PROXIES[proxyIndex](apiUrl);
    addDebug(`[${sourceName}] 프록시 ${proxyIndex + 1} 시도`, 'info');

    try {
        const response = await fetch(proxyUrl);
        if (!response.ok) {
            addDebug(`HTTP ${response.status} → 다음 프록시 시도`, 'warn');
            return fetchPublicDataAPI(apiUrl, sourceName, proxyIndex + 1);
        }

        const text = await response.text();
        const trimmed = text.trim();

        // 빈 응답 또는 프록시 오류
        if (!trimmed || trimmed.toLowerCase().includes('unexpected') || 
            trimmed.toLowerCase().includes('rate limit')) {
            addDebug(`프록시 오류 → 다음 프록시 시도`, 'warn');
            return fetchPublicDataAPI(apiUrl, sourceName, proxyIndex + 1);
        }

        // XML 응답 처리
        if (trimmed.startsWith('<?xml') || trimmed.startsWith('<response')) {
            addDebug(`XML 응답 감지 → 파싱 중`, 'info');
            return parseXMLResponse(trimmed, sourceName);
        }

        // JSON 응답 처리
        if (trimmed.startsWith('{') || trimmed.startsWith('[')) {
            addDebug(`JSON 응답 감지 → 파싱 중`, 'info');
            const json = JSON.parse(trimmed);
            
            // 국토부/환경부 JSON 구조 통합 처리
            let items = json?.response?.body?.items?.item || json?.items?.item || [];
            if (!items) return [];
            
            const result = Array.isArray(items) ? items : [items];
            addDebug(`JSON 파싱 성공: ${result.length}건`, 'ok');
            return result;
        }

        addDebug(`알 수 없는 응답 형식 → 다음 프록시 시도`, 'warn');
        return fetchPublicDataAPI(apiUrl, sourceName, proxyIndex + 1);

    } catch (error) {
        addDebug(`네트워크 오류: ${error.message} → 다음 프록시`, 'warn');
        return fetchPublicDataAPI(apiUrl, sourceName, proxyIndex + 1);
    }
}

function parseXMLResponse(xmlText, sourceName) {
    const parser = new DOMParser();
    const doc = parser.parseFromString(xmlText, 'application/xml');

    // XML 파싱 오류 체크
    const parseError = doc.querySelector('parsererror');
    if (parseError) {
        throw new Error('XML 파싱 오류: ' + parseError.textContent);
    }

    // 공공데이터포털 에러 메시지 감지
    const resultCode = doc.querySelector('resultCode')?.textContent?.trim();
    const resultMsg = doc.querySelector('resultMsg')?.textContent?.trim();
    const returnAuthMsg = doc.querySelector('returnAuthMsg')?.textContent?.trim();
    const errMsg = doc.querySelector('errMsg')?.textContent?.trim();

    // 에러 코드 체크
    if (resultCode && resultCode !== '00' && resultCode !== '0000') {
        throw new Error(`API 오류 [${resultCode}]: ${resultMsg || '알 수 없는 오류'}`);
    }

    // 인증 오류 체크
    if (returnAuthMsg && returnAuthMsg.includes('ERROR')) {
        throw new Error(`API 키 오류: ${returnAuthMsg}`);
    }
    if (errMsg) {
        throw new Error(`시스템 오류: ${errMsg}`);
    }

    // 정상 데이터 파싱
    const items = [];
    doc.querySelectorAll('item').forEach(item => {
        const obj = {};
        Array.from(item.children).forEach(child => {
            obj[child.tagName] = child.textContent.trim();
        });
        items.push(obj);
    });

    addDebug(`XML 파싱 성공: ${items.length}건`, 'ok');
    return items;
}

// ============================================================
// API 호출 함수들
// ============================================================
async function fetchApartments(keyword, key) {
    // URL 인코딩 처리 (이중 인코딩 방지)
    const safeKey = key.includes('%') ? decodeURIComponent(key) : key;
    
    const params = new URLSearchParams({
        serviceKey: safeKey,
        kaptName: keyword,
        pageNo: 1,
        numOfRows: 30,
        _type: 'json'  // JSON 요청하지만 XML도 처리 가능
    });

    const apiUrl = `https://apis.data.go.kr/1613000/AptBasisInfoServiceV4/getAptBasisInfo?${params}`;
    addDebug(`국토부 V4 API 호출: "${keyword}"`, 'info');
    
    return await fetchPublicDataAPI(apiUrl, '국토부 V4');
}

async function fetchChargers(aptName, key) {
    const safeKey = key.includes('%') ? decodeURIComponent(key) : key;
    
    const params = new URLSearchParams({
        serviceKey: safeKey,
        statNm: aptName,
        pageNo: 1,
        numOfRows: 100,
        dataType: 'JSON'  // 환경부는 dataType 사용
    });

    const apiUrl = `https://apis.data.go.kr/B552584/EvCharger/getChargerInfo?${params}`;
    
    try {
        return await fetchPublicDataAPI(apiUrl, '환경부');
    } catch (error) {
        addDebug(`충전기 조회 실패 (${aptName}): ${error.message}`, 'warn');
        return [];
    }
}

// ============================================================
// 위치 정보 파싱
// ============================================================
function parseLocation(location, note) {
    const text = ((location || '') + ' ' + (note || '')).toLowerCase();
    
    if (text.includes('지하') || text.match(/b\d+/i) || text.includes('basement')) {
        return { label: '지하', class: 'loc-underground' };
    }
    if (text.includes('지상') || text.includes('옥외') || text.includes('1층') || text.includes('ground')) {
        return { label: '지상', class: 'loc-ground' };
    }
    return { label: '위치미상', class: 'loc-unknown' };
}

// ============================================================
// 메인 검색 함수
// ============================================================
async function performSearch() {
    const keyword = document.getElementById('searchInput').value.trim();
    if (!keyword) {
        showToast('⚠️ 검색어를 입력해주세요');
        return;
    }

    const molitKey = localStorage.getItem('apt_molit_key');
    const envKey = localStorage.getItem('apt_env_key');
    
    if (!isValidKey(molitKey) || !isValidKey(envKey)) {
        showToast('⚠️ API 키를 먼저 설정하세요\n(또는 🧪 데모 버튼 사용)');
        return;
    }

    showLoading(true);
    showDebug(true);
    clearDebug();
    addDebug(`=== 검색 시작: "${keyword}" ===`, 'info');

    try {
        // 1단계: 아파트 목록 조회
        const apartments = await fetchApartments(keyword, molitKey);
        
        if (apartments.length === 0) {
            showToast('🔍 검색 결과가 없습니다');
            return;
        }

        addDebug(`아파트 ${apartments.length}개 조회됨`, 'ok');

        // 2단계: 각 아파트의 충전기 정보 조회 및 데이터 보강
        const enrichedData = [];
        
        for (const apt of apartments) {
            addDebug(`충전기 조회: ${apt.kaptName}`, 'info');
            
            const chargers = await fetchChargers(apt.kaptName, envKey);
            const totalParking = parseInt(apt.kaptdaCnt) || 0;
            const chargerCount = chargers.length;
            const ratio = totalParking > 0 
                ? parseFloat(((chargerCount / totalParking) * 100).toFixed(2))
                : 0;

            // 운영사별 집계
            const operators = {};
            chargers.forEach(c => {
                const op = c.busiNm || c.bnm || '미확인';
                operators[op] = (operators[op] || 0) + 1;
            });

            // 위치별 집계
            const locations = { 지하: 0, 지상: 0, 위치미상: 0 };
            chargers.forEach(c => {
                const loc = parseLocation(c.location, c.note);
                locations[loc.label]++;
            });

            // 설치년도 분석
            const years = chargers
                .map(c => c.upddt?.substring(0, 4))
                .filter(y => y && y > 2000)
                .map(y => parseInt(y));
            
            const installYearRange = years.length > 0 
                ? { min: Math.min(...years), max: Math.max(...years) }
                : null;

            enrichedData.push({
                // 기본 정보
                kaptCode: apt.kaptCode || '',
                kaptName: apt.kaptName || '',
                kaptAddr: apt.kaptAddr || '',
                doroJuso: apt.doroJuso || '',
                kaptdaCnt: apt.kaptdaCnt || '0',
                kaptTotHoCnt: apt.kaptTotHoCnt || '0',
                kaptDongCnt: apt.kaptDongCnt || '0',
                kaptUseDate: apt.kaptUseDate || '',
                latitude: apt.latitude || '',
                longitude: apt.longitude || '',
                
                // 충전기 관련
                chargers,
                chargerCount,
                totalParking,
                ratio,
                hasChargers: chargerCount > 0,
                operators,
                locations,
                installYearRange
            });
        }

        currentData = enrichedData;
        renderList(currentData);
        plotMarkers(currentData);
        
        addDebug(`=== 검색 완료: ${currentData.length}개 단지 ===`, 'ok');
        showToast(`✅ ${currentData.length}개 단지 검색 완료`);

    } catch (error) {
        addDebug(`검색 오류: ${error.message}`, 'err');
        showToast(`❌ ${error.message}`);
    } finally {
        showLoading(false);
    }
}

// ============================================================
// 지도 마커 표시
// ============================================================
function plotMarkers(data) {
    // 기존 마커 제거
    markers.forEach(marker => leafletMap.removeLayer(marker));
    markers = [];

    const bounds = [];

    data.forEach((apt, index) => {
        const lat = parseFloat(apt.latitude);
        const lng = parseFloat(apt.longitude);
        
        if (!lat || !lng) return;

        // 커스텀 마커 아이콘
        const markerIcon = L.divIcon({
            className: '',
            html: `
                <div style="
                    background: ${apt.hasChargers ? '#16a34a' : '#dc2626'};
                    color: white; width: 36px; height: 36px;
                    border-radius: 50% 50% 50% 0; transform: rotate(-45deg);
                    display: flex; align-items: center; justify-content: center;
                    box-shadow: 0 2px 8px rgba(0,0,0,0.3); border: 2px solid white;
                ">
                    <span style="transform: rotate(45deg); font-size: 16px;">
                        ${apt.hasChargers ? '⚡' : '🏢'}
                    </span>
                </div>`,
            iconSize: [36, 36],
            iconAnchor: [18, 36],
            popupAnchor: [0, -36]
        });

        const marker = L.marker([lat, lng], { icon: markerIcon })
            .addTo(leafletMap)
            .bindPopup(`
                <div style="min-width: 200px; font-family: 'Malgun Gothic', sans-serif;">
                    <strong style="font-size: 1rem;">${apt.kaptName}</strong><br>
                    <span style="color: #64748b; font-size: 0.85rem;">${apt.kaptAddr}</span><br><br>
                    🅿️ 총 주차면: <strong>${apt.totalParking.toLocaleString()}면</strong><br>
                    ⚡ 충전기 수: <strong style="color: ${apt.hasChargers ? '#16a34a' : '#dc2626'}">
                        ${apt.chargerCount}기</strong><br>
                    📊 설치 비율: <strong>${apt.ratio}%</strong>
                </div>
            `);

        marker.on('click', () => {
            highlightCard(index);
            showDetailModal(index);
        });

        markers.push(marker);
        bounds.push([lat, lng]);
    });

    // 모든 마커가 보이도록 지도 범위 조정
    if (bounds.length > 0) {
        leafletMap.fitBounds(bounds, { padding: [40, 40] });
    }

    document.getElementById('mapCount').textContent = `${data.length}개 단지`;
}

// ============================================================
// 목록 렌더링
// ============================================================
function renderList(data) {
    const container = document.getElementById('resultList');
    document.getElementById('listCount').textContent = `${data.length}건`;

    if (data.length === 0) {
        container.innerHTML = `
            <div class="empty">
                <div class="icon">🔍</div>
                <p>검색 결과가 없습니다</p>
            </div>`;
        return;
    }

    container.innerHTML = data.map((apt, index) => `
        <div class="apt-card" id="card-${index}" onclick="showDetailModal(${index})">
            <div class="card-top">
                <div class="apt-name">🏢 ${apt.kaptName}</div>
                <span class="badge ${apt.hasChargers ? 'badge-y' : 'badge-n'}">
                    ${apt.hasChargers ? `⚡ ${apt.chargerCount}기` : '❌ 없음'}
                </span>
            </div>
            <div class="apt-addr">📍 ${apt.kaptAddr || '주소 정보 없음'}</div>
            <div class="stats">
                <div class="stat">
                    <div class="sv">${apt.totalParking.toLocaleString()}</div>
                    <div class="sl">총 주차면</div>
                </div>
                <div class="stat">
                    <div class="sv">${apt.chargerCount}</div>
                    <div class="sl">충전기 수</div>
                </div>
                <div class="stat">
                    <div class="sv">${apt.ratio}%</div>
                    <div class="sl">설치 비율</div>
                </div>
            </div>
            ${apt.hasChargers ? `
            <div class="progress-bar">
                <div class="progress-fill" style="width: ${Math.min(apt.ratio * 10, 100)}%"></div>
            </div>` : ''}
        </div>
    `).join('');
}

// ============================================================
// 상세 모달
// ============================================================
function showDetailModal(index) {
    const apt = currentData[index];
    highlightCard(index);

    const operatorList = Object.entries(apt.operators)
        .map(([op, count]) => `<li>${op}: ${count}기</li>`).join('');

    const chargerRows = apt.chargers.map(charger => {
        const loc = parseLocation(charger.location, charger.note);
        const typeName = CHARGER_TYPES[charger.chgerType] || charger.chgerType || '-';
        const output = charger.output ? `${charger.output}kW` : '-';
        
        return `
            <tr>
                <td>${charger.busiNm || charger.bnm || '-'}</td>
                <td>${output}</td>
                <td>${typeName}</td>
                <td><span class="loc-badge ${loc.class}">${loc.label}</span></td>
                <td>${charger.location || charger.note || '-'}</td>
                <td>${charger.useTime || '24시간'}</td>
            </tr>`;
    }).join('');

    document.getElementById('modalBody').innerHTML = `
        <h2>🏢 ${apt.kaptName}</h2>
        <div class="modal-addr">📍 ${apt.kaptAddr}</div>

        <div class="modal-section">
            <h3>📊 단지 기본 정보</h3>
            <table class="info-table">
                <tr>
                    <th>총 세대수</th><td>${parseInt(apt.kaptTotHoCnt || 0).toLocaleString()}세대</td>
                    <th>총 동수</th><td>${apt.kaptDongCnt || '-'}동</td>
                </tr>
                <tr>
                    <th>총 주차면</th><td>${apt.totalParking.toLocaleString()}면</td>
                    <th>사용승인일</th><td>${apt.kaptUseDate ? apt.kaptUseDate.replace(/(\d{4})(\d{2})(\d{2})/, '$1-$2-$3') : '-'}</td>
                </tr>
                <tr>
                    <th>충전기 수</th><td><strong style="color: #1d4ed8">${apt.chargerCount}기</strong></td>
                    <th>설치 비율</th><td><strong style="color: #16a34a">${apt.ratio}%</strong></td>
                </tr>
            </table>
        </div>

        ${apt.hasChargers ? `
        <div class="modal-section">
            <h3>🏢 운영사별 현황</h3>
            <ul style="padding-left: 20px; font-size: 0.9rem; color: #374151;">
                ${operatorList}
            </ul>
        </div>

        <div class="modal-section">
            <h3>📍 설치 위치별 현황</h3>
            <div style="display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 10px;">
                <span class="loc-badge loc-underground">지하: ${apt.locations['지하']}기</span>
                <span class="loc-badge loc-ground">지상: ${apt.locations['지상']}기</span>
                <span class="loc-badge loc-unknown">위치미상: ${apt.locations['위치미상']}기</span>
            </div>
        </div>

        <div class="modal-section">
            <h3>🔌 충전기 상세 목록</h3>
            <div style="overflow-x: auto;">
                <table class="charger-table">
                    <thead>
                        <tr>
                            <th>운영사</th>
                            <th>용량</th>
                            <th>충전타입</th>
                            <th>위치구분</th>
                            <th>상세위치</th>
                            <th>이용시간</th>
                        </tr>
                    </thead>
                    <tbody>${chargerRows}</tbody>
                </table>
            </div>
        </div>
        ` : `
        <div class="empty">
            <div class="icon">❌</div>
            <p>설치된 전기차 충전기가 없습니다</p>
        </div>
        `}
    `;

    document.getElementById('modalOverlay').classList.add('show');
}

function closeModal(event) {
    if (event && event.target !== document.getElementById('modalOverlay')) return;
    document.getElementById('modalOverlay').classList.remove('show');
}

function highlightCard(index) {
    // 모든 카드 하이라이트 제거
    document.querySelectorAll('.apt-card').forEach(card => {
        card.classList.remove('active');
    });

    // 선택된 카드 하이라이트
    const card = document.getElementById(`card-${index}`);
    if (card) {
        card.classList.add('active');
        card.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }
}

// ============================================================
// 유틸리티 함수들
// ============================================================
function showLoading(show) {
    document.getElementById('loadingWrap').classList.toggle('show', show);
    document.getElementById('resultList').style.display = show ? 'none' : 'block';
}

function showToast(message) {
    const toast = document.getElementById('toast');
    toast.textContent = message;
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 3500);
}

function addDebug(message, type = 'info') {
    const box = document.getElementById('debugBox');
    const line = document.createElement('div');
    line.className = `d-${type}`;
    line.textContent = `[${new Date().toLocaleTimeString()}] ${message}`;
    box.appendChild(line);
    box.scrollTop = box.scrollHeight;
    
    // 디버그 라인 수 제한 (성능 최적화)
    if (box.children.length > 50) {
        box.removeChild(box.firstChild);
    }
}

function showDebug(show) {
    document.getElementById('debugBox').classList.toggle('show', show);
}

function clearDebug() {
    document.getElementById('debugBox').innerHTML = '';
}
